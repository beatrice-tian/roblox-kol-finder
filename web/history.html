<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>历史报告 · Roblox Creator Scout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/app.css" />
  </head>
  <body class="history-page">
    <div class="page">
      <header class="history-header">
        <a class="back-link" href="/">← 返回最新报告</a>
        <h1 class="history-title">历史报告</h1>
        <p class="history-subtitle">按时间倒序浏览各期 Creator Scout Brief</p>
      </header>

      <ul class="history-list" id="history-list" aria-label="历史报告列表"></ul>
      <p class="empty-state" id="history-empty" hidden>暂无历史报告</p>

      <footer class="site-footer">
        <p>Produced by Xueyao Tian</p>
      </footer>
    </div>

    <script src="/js/history.js" type="module"></script>
  </body>
</html>
